<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Origine S</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
</head>
<body>
<div class="app">

    <div class="dropzone-overlay hidden" id="dropzone-overlay">
        <div class="dropzone-inner">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>Déposez votre fichier</p>
            <span>Origine S va l'analyser</span>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="brand">ORIGINE S</div>
            <button class="icon-btn" id="btn-new" title="Nouvelle conversation">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
        </div>
        <div class="search-wrap">
            <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Rechercher..." autocomplete="off">
        </div>
        <div class="conv-list" id="conv-list"></div>
    </aside>

    <main class="main" id="main-content">
        <header class="chat-header">
            <button class="icon-btn mobile-only" id="btn-menu">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span class="chat-title" id="chat-title">Nouvelle conversation</span>
            <div class="header-actions">
                <span class="status-dot" id="status-dot"></span>
                <button class="icon-btn" id="btn-memory" title="Mémoire">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                </button>
                <button class="icon-btn" id="btn-export" title="Exporter">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
                <button class="icon-btn" id="btn-rename" title="Renommer">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="icon-btn danger-btn" id="btn-delete" title="Supprimer">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                </button>
            </div>
        </header>

        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <div class="welcome-logo">
                    <div class="logo-sphere"></div>
                    <span class="logo-text">Origine S</span>
                </div>
                <h1 class="welcome-title">Bonjour, <span>Sylvanus</span></h1>
                <p class="welcome-sub">Votre agent IA personnel. Que puis-je faire pour vous ?</p>
                <div class="starters" id="starters">
                    <button class="starter-chip" data-prompt="Quelle est la météo à Cotonou en ce moment ?">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/></svg>
                        Météo Cotonou
                    </button>
                    <button class="starter-chip" data-prompt="Quelles sont les dernières actualités tech ?">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                        Actualités tech
                    </button>
                    <button class="starter-chip" data-prompt="Aide-moi à écrire un script Python propre et commenté">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                        Écrire du code
                    </button>
                    <button class="starter-chip" data-prompt="Lis mes 5 derniers emails">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        Mes emails
                    </button>
                </div>
            </div>
        </div>

        <div class="thinking-bar hidden" id="thinking-bar">
            <div class="t-sphere-wrap">
                <div class="t-sphere"></div>
            </div>
            <span class="thinking-text">Origine S réfléchit<span class="t-dots"></span></span>
        </div>

        <div class="suggestions-bar hidden" id="suggestions-bar"></div>

        <div class="memory-panel hidden" id="memory-panel">
            <div class="memory-header">
                <span>Mémoire</span>
                <button id="btn-close-mem">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="memory-body" id="memory-body"></div>
        </div>

        <button class="scroll-btn hidden" id="btn-scroll">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>

        <div class="input-area">
            <div class="input-wrap" id="input-wrap">
                <button class="ibtn" id="btn-voice" title="Voix">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </button>
                <textarea id="input" placeholder="Écrivez à Origine S..." rows="1"></textarea>
                <button class="ibtn send-btn hidden" id="btn-stop" title="Arrêter">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
                </button>
                <button class="ibtn send-btn" id="btn-send" title="Envoyer">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                </button>
            </div>
        </div>
    </main>
</div>
<script src="/static/app.js"></script>
</body>
</html>
